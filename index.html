<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hypergolic Telemetry Dashboard</title>
    <style>
        body { margin: 0; padding: 20px; background-color: #0d1117; color: #c9d1d9; font-family: 'Consolas', 'Courier New', monospace; display: flex; justify-content: center; }
        .dashboard { max-width: 800px; width: 100%; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .header { text-align: center; border-bottom: 2px solid #238636; padding-bottom: 10px; margin-bottom: 20px; }
        .header h1 { margin: 0; color: #58a6ff; font-size: 24px; letter-spacing: 2px; text-transform: uppercase; }
        .header p { margin: 5px 0 0 0; font-size: 12px; color: #8b949e; }
        
        .grid-layout { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; }
        @media (max-width: 600px) { .grid-layout { grid-template-columns: 1fr; } }
        
        /* Controls Section */
        .controls { background: #0d1117; padding: 15px; border-radius: 6px; border: 1px solid #30363d; }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: #8b949e; margin-bottom: 4px; text-transform: uppercase; }
        input { width: 100%; padding: 8px; background: #21262d; border: 1px solid #30363d; color: #58a6ff; font-family: inherit; font-size: 14px; border-radius: 4px; box-sizing: border-box; text-align: right; }
        button { width: 100%; padding: 12px; margin-top: 10px; background: #238636; color: white; border: none; border-radius: 4px; font-weight: bold; font-family: inherit; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
        button:hover { background: #2ea043; }
        button:disabled { background: #30363d; color: #8b949e; cursor: not-allowed; }

        /* Visualizer Section */
        .sim-area { position: relative; display: flex; flex-direction: column; gap: 15px; }
        .canvas-container { position: relative; background: #010409; border: 1px solid #30363d; border-radius: 6px; overflow: hidden; height: 250px; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* Overlay UI on Canvas */
        .status-badge { position: absolute; top: 10px; left: 10px; font-size: 10px; padding: 3px 8px; border-radius: 10px; background: rgba(35, 134, 54, 0.2); color: #3fb950; border: 1px solid #238636; }
        
        /* Live Graph */
        .graph-container { background: #010409; border: 1px solid #30363d; border-radius: 6px; height: 120px; position: relative; padding: 10px; }
        .graph-title { position: absolute; top: 5px; left: 10px; font-size: 10px; color: #8b949e; }
        
        /* Telemetry Readouts */
        .telemetry { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .data-box { background: #0d1117; border: 1px solid #30363d; padding: 10px; border-radius: 4px; text-align: center; }
        .data-box span { display: block; font-size: 10px; color: #8b949e; text-transform: uppercase; }
        .data-box strong { display: block; font-size: 18px; color: #ff7b72; margin-top: 4px; font-weight: normal; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header">
            <h1>Test Cell Telemetry</h1>
            <p>KMnO₄ / H₂SO₄ / Ethanol Surrogate Analysis</p>
        </div>

        <div class="grid-layout">
            <div class="controls">
                <div class="input-group">
                    <label>KMnO₄ Mass (grams)</label>
                    <input type="number" id="kmno4" value="5" step="0.1">
                </div>
                <div class="input-group">
                    <label>H₂SO₄ Vol (ml)</label>
                    <input type="number" id="h2so4" value="10" step="0.1">
                </div>
                <div class="input-group">
                    <label>Ethanol Vol (ml)</label>
                    <input type="number" id="ethanol" value="25" step="0.1">
                </div>
                <button id="btn-ignite" onclick="ignite()">Initiate Sequence</button>

                <div class="telemetry">
                    <div class="data-box">
                        <span>Peak Temp</span>
                        <strong id="out-temp">-- °C</strong>
                    </div>
                    <div class="data-box">
                        <span>Residue</span>
                        <strong id="out-res">-- g</strong>
                    </div>
                    <div class="data-box">
                        <span>Delay</span>
                        <strong id="out-delay">-- ms</strong>
                    </div>
                    <div class="data-box">
                        <span>Status</span>
                        <strong id="out-status" style="color:#8b949e;">STANDBY</strong>
                    </div>
                </div>
            </div>

            <div class="sim-area">
                <div class="canvas-container">
                    <div class="status-badge" id="badge">CAM-01: NOMINAL</div>
                    <canvas id="simCanvas"></canvas>
                </div>
                
                <div class="graph-container">
                    <span class="graph-title">TRANSIENT THERMAL RESPONSE (T vs. t)</span>
                    <canvas id="graphCanvas"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- Setup Canvases ---
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const graphCanvas = document.getElementById('graphCanvas');
        const gCtx = graphCanvas.getContext('2d');
        
        // Match CSS sizes
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = 250;
        graphCanvas.width = graphCanvas.parentElement.clientWidth - 20;
        graphCanvas.height = 100;

        // --- Physics Engine State ---
        let isInjecting = false;
        let isBurning = false;
        let particles = [];
        let streams = { y: 0, active: false };
        let graphData = [];
        let timeStep = 0;

        class Particle {
            constructor(x, y, type) {
                this.x = x; this.y = y; this.type = type;
                this.life = 1.0;
                
                if (type === 'fire') {
                    this.vx = (Math.random() - 0.5) * 6;
                    this.vy = (Math.random() * -8) - 2;
                    this.size = Math.random() * 8 + 4;
                    this.decay = Math.random() * 0.05 + 0.02;
                    this.color = Math.random() > 0.5 ? '#ff7b72' : '#ffa657'; // Red/Orange
                } else {
                    // Smoke
                    this.vx = (Math.random() - 0.5) * 4;
                    this.vy = (Math.random() * -3) - 1;
                    this.size = Math.random() * 15 + 10;
                    this.decay = Math.random() * 0.02 + 0.01;
                    this.color = `rgba(139, 69, 19, ${Math.random()*0.5 + 0.2})`; // Brownish
                }
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.life -= this.decay;
                if(this.type === 'smoke') { this.size += 0.5; this.x += Math.sin(this.life*10)*0.5; }
            }
            draw(c) {
                c.globalAlpha = Math.max(0, this.life);
                c.fillStyle = this.color;
                c.beginPath();
                c.arc(this.x, this.y, this.size, 0, Math.PI*2);
                c.fill();
                c.globalAlpha = 1.0;
            }
        }

        function drawEnvironment() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Aluminum Can
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#8b949e';
            ctx.fillStyle = '#21262d';
            ctx.beginPath();
            ctx.rect(canvas.width/2 - 40, canvas.height - 100, 80, 100);
            ctx.fill();
            ctx.stroke();

            // Draw Injectors
            ctx.lineWidth = 6;
            // Left (Oxidizer)
            ctx.strokeStyle = '#d2a8ff';
            ctx.beginPath(); ctx.moveTo(canvas.width/2 - 60, 20); ctx.lineTo(canvas.width/2 - 20, 50); ctx.stroke();
            // Right (Fuel)
            ctx.strokeStyle = '#79c0ff';
            ctx.beginPath(); ctx.moveTo(canvas.width/2 + 60, 20); ctx.lineTo(canvas.width/2 + 20, 50); ctx.stroke();

            // Draw Streams
            if (streams.active) {
                ctx.lineWidth = 3;
                streams.y += 10;
                if(streams.y > 100) streams.y = 100;
                
                ctx.strokeStyle = '#d2a8ff';
                ctx.beginPath(); ctx.moveTo(canvas.width/2 - 20, 50); ctx.lineTo(canvas.width/2, streams.y); ctx.stroke();
                
                ctx.strokeStyle = '#79c0ff';
                ctx.beginPath(); ctx.moveTo(canvas.width/2 + 20, 50); ctx.lineTo(canvas.width/2, streams.y); ctx.stroke();
                
                if(streams.y >= 100 && !isBurning) {
                    isBurning = true;
                    document.getElementById('badge').innerText = "IGNITION!";
                    document.getElementById('badge').style.color = "#ff7b72";
                    document.getElementById('badge').style.borderColor = "#ff7b72";
                    document.getElementById('badge').style.background = "rgba(255, 123, 114, 0.2)";
                }
            }

            // Draw Particles
            if (isBurning) {
                // Spawn new particles
                for(let i=0; i<5; i++) particles.push(new Particle(canvas.width/2, 100, 'fire'));
                for(let i=0; i<2; i++) particles.push(new Particle(canvas.width/2, 90, 'smoke'));
            }
            
            // Update and draw existing
            for(let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw(ctx);
                if(particles[i].life <= 0) particles.splice(i, 1);
            }
        }

        function drawGraph() {
            gCtx.clearRect(0, 0, graphCanvas.width, graphCanvas.height);
            
            // Grid lines
            gCtx.strokeStyle = '#30363d';
            gCtx.lineWidth = 1;
            gCtx.beginPath(); gCtx.moveTo(0, graphCanvas.height/2); gCtx.lineTo(graphCanvas.width, graphCanvas.height/2); gCtx.stroke();
            
            if (graphData.length === 0) return;

            gCtx.strokeStyle = '#ff7b72';
            gCtx.lineWidth = 2;
            gCtx.beginPath();
            
            let maxTemp = Math.max(...graphData, 100);
            
            for(let i=0; i<graphData.length; i++) {
                let x = (i / 100) * graphCanvas.width; // 100 ticks width
                let y = graphCanvas.height - ((graphData[i] / maxTemp) * (graphCanvas.height - 10));
                if(i===0) gCtx.moveTo(x, y);
                else gCtx.lineTo(x, y);
            }
            gCtx.stroke();
        }

        function loop() {
            drawEnvironment();
            
            // Update Graph logic
            if (isInjecting) {
                timeStep++;
                if (timeStep < 20) {
                    graphData.push(20); // Ambient before impingement
                } else if (isBurning && timeStep < 40) {
                    // Huge spike
                    let val = graphData[graphData.length-1] + 150;
                    graphData.push(val);
                } else if (isBurning) {
                    // Plateau
                    let val = graphData[graphData.length-1] + (Math.random()*20 - 10);
                    graphData.push(val);
                }
                
                if(graphData.length > 100) graphData.shift();
                drawGraph();
            }
            
            requestAnimationFrame(loop);
        }

        function ignite() {
            let kmno4 = parseFloat(document.getElementById('kmno4').value);
            let ethanol = parseFloat(document.getElementById('ethanol').value);
            
            if(kmno4 > 0 && ethanol > 0) {
                document.getElementById('btn-ignite').disabled = true;
                
                // Math
                let peakTemp = Math.round(750 + (kmno4 * 65) + (ethanol * 1.5)); 
                let residueWeight = (kmno4 * 0.88).toFixed(2);
                
                // Reset State
                particles = [];
                graphData = [20];
                timeStep = 0;
                streams.y = 20;
                streams.active = true;
                isInjecting = true;
                isBurning = false;
                
                document.getElementById('out-status').innerText = "INJECTING";
                document.getElementById('out-status').style.color = "#79c0ff";

                // Stop injection after 1.5s
                setTimeout(() => {
                    streams.active = false;
                    document.getElementById('out-temp').innerText = peakTemp + " °C";
                    document.getElementById('out-res').innerText = residueWeight + " g";
                    document.getElementById('out-delay').innerText = "1.2 ms";
                    document.getElementById('out-status').innerText = "EXOTHERMIC";
                    document.getElementById('out-status').style.color = "#ff7b72";
                }, 1500);

                // End burn after 3s
                setTimeout(() => {
                    isBurning = false;
                    isInjecting = false;
                    document.getElementById('btn-ignite').disabled = false;
                    document.getElementById('btn-ignite').innerText = "RE-ARM SYSTEM";
                    document.getElementById('badge').innerText = "TEST COMPLETE";
                    document.getElementById('badge').style.color = "#8b949e";
                    document.getElementById('badge').style.borderColor = "#8b949e";
                    document.getElementById('badge').style.background = "transparent";
                }, 3000);
            }
        }

        // Start render loop
        loop();
        drawGraph();
    </script>
</body>
</html>
